# Distributed ARP Watcher - Agent Configuration
# This file is used to configure the C/C++ Agent.
# Default location checked is /etc/distarpwatcher/agent.conf, falling back to local ./agent.conf

[agent]
# The unique identifier for this agent node. This will be sent to the server with every event.
agent_id = my-linux-node-1

# The interface to capture packets from (e.g., eth0, wlan0). Use "any" to capture all interfaces.
interface = any

[server]
# The address and port of the centralized Go gRPC server
server_address = localhost:50051

# mTLS Certificate Paths (relative to the executable or absolute)
ca_cert = ../certs/ca.pem
client_cert = ../certs/client.pem
client_key = ../certs/client.key
